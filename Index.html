<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Happy Birthday, My Love</title>
<style>
  :root{
    --gold:#f2c879;
    --rosegold:#e8a9a0;
    --magenta:#e8558f;
    --purple:#7a5bcf;
    --pink:#e8437a;
    --bg:#05030a;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    -webkit-tap-highlight-color: transparent;
  }
  #bg-canvas{
    position:fixed; inset:0; width:100%; height:100%; display:block;
  }

  /* ---------- Landing overlay ---------- */
  #overlay{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:50;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(122,91,207,0.22), transparent 60%),
      radial-gradient(ellipse at 50% 80%, rgba(232,85,143,0.14), transparent 60%),
      #05030a;
    transition: opacity 1.4s ease, visibility 1.4s ease;
  }
  #overlay.fade-out{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .card{
    position:relative;
    width:min(88vw, 380px);
    padding:36px 30px 32px;
    border-radius:22px;
    background:linear-gradient(180deg, rgba(20,12,32,0.92), rgba(10,6,20,0.96));
    border:1px solid rgba(240,190,200,0.22);
    box-shadow:
      0 0 60px rgba(232,85,143,0.18),
      0 0 120px rgba(122,91,207,0.14),
      inset 0 0 40px rgba(255,255,255,0.02);
    text-align:center;
    animation: cardFloat 6s ease-in-out infinite;
  }
  @keyframes cardFloat{
    0%,100%{ transform: translateY(0px); }
    50%{ transform: translateY(-8px); }
  }

  .eyebrow{
    letter-spacing:4px;
    font-size:11px;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.85;
    margin-bottom:10px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .card h1{
    font-size:26px;
    margin:0 0 22px;
    line-height:1.35;
    background:linear-gradient(90deg, var(--gold), var(--pink) 55%, var(--purple));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow: 0 0 22px rgba(232,85,143,0.25);
    font-weight:600;
  }

  .portrait{
    width:150px; height:150px;
    margin:0 auto 22px;
    border-radius:50%;
    position:relative;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.08), transparent 60%),
      radial-gradient(circle, #2a1440, #0b0616 70%);
    box-shadow:
      0 0 0 2px rgba(240,190,200,0.3),
      0 0 26px rgba(232,85,143,0.35),
      0 0 50px rgba(122,91,207,0.25);
  }
  .portrait::before{
    content:"";
    position:absolute; inset:-10px;
    border-radius:50%;
    border:1px dashed rgba(242,200,121,0.35);
    animation: spin 18s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .portrait svg{ width:70px; height:70px; opacity:0.9; }

  .subtext{
    color:#d9c9e8;
    font-size:14px;
    line-height:1.6;
    margin:0 0 26px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    opacity:0.85;
  }

  .open-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    padding:15px 34px;
    border-radius:999px;
    font-size:13px;
    letter-spacing:2.5px;
    font-family:'Helvetica Neue', Arial, sans-serif;
    font-weight:600;
    color:#1a0a12;
    background:linear-gradient(90deg, var(--gold), var(--pink) 60%, var(--purple));
    box-shadow: 0 6px 20px rgba(232,85,143,0.3), 0 0 0 1px rgba(255,255,255,0.12) inset;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .open-btn:hover{
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 10px 28px rgba(232,85,143,0.45), 0 0 0 1px rgba(255,255,255,0.18) inset;
  }
  .open-btn:active{ transform: translateY(0) scale(0.98); }

  .hint{
    position:fixed;
    bottom:22px; left:0; right:0;
    text-align:center;
    color:rgba(230,220,240,0.5);
    font-size:12px;
    font-family:'Helvetica Neue', Arial, sans-serif;
    letter-spacing:1px;
    z-index:40;
    opacity:0;
    transition: opacity 1.5s ease 1s;
    pointer-events:none;
  }
  .hint.show{ opacity:1; }

  #back-btn{
    position:fixed;
    top:18px; left:18px;
    z-index:40;
    background:rgba(20,12,32,0.5);
    border:1px solid rgba(240,190,200,0.25);
    color:#f3e4ee;
    font-family:'Helvetica Neue', Arial, sans-serif;
    font-size:12px;
    letter-spacing:1px;
    padding:9px 16px;
    border-radius:999px;
    cursor:pointer;
    opacity:0;
    transition: opacity 0.8s ease 0.6s;
    pointer-events:none;
    backdrop-filter: blur(6px);
  }
  #back-btn.show{ opacity:1; pointer-events:auto; }
  #back-btn:hover{ background:rgba(40,20,50,0.65); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="overlay">
  <div class="card">
    <div class="eyebrow">Galaxy Gallery</div>
    <h1>Happy Birthday,<br/>My Love!</h1>
    <div class="portrait">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 21s-7.5-4.6-10-9.3C.4 8 2 4.5 5.6 4a5 5 0 0 1 6.4 2.3A5 5 0 0 1 18.4 4C22 4.5 23.6 8 22 11.7 19.5 16.4 12 21 12 21z"
          fill="url(#g)" stroke="#f6dde8" stroke-width="0.4"/>
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f2c879"/>
            <stop offset="55%" stop-color="#e8558f"/>
            <stop offset="100%" stop-color="#7a5bcf"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <p class="subtext">A whole universe made of every reason<br/>I love you. Ready to see it?</p>
    <button class="open-btn" id="open-btn">PARA MI PRINCESA</button>
  </div>
</div>

<div class="hint" id="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>
<button id="back-btn">← BACK</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
  "use strict";

  // ---------------------------------------------------------------
  // Soft circular point texture (shared by all particle systems)
  // ---------------------------------------------------------------
  function makeSoftDotTexture(){
    const size = 128;
    const cnv = document.createElement('canvas');
    cnv.width = cnv.height = size;
    const ctx = cnv.getContext('2d');
    const grad = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    grad.addColorStop(0.0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.25,'rgba(255,255,255,0.85)');
    grad.addColorStop(0.55,'rgba(255,255,255,0.25)');
    grad.addColorStop(1.0, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,size,size);
    const tex = new THREE.CanvasTexture(cnv);
    tex.needsUpdate = true;
    return tex;
  }
  const dotTexture = makeSoftDotTexture();

  function makeGlowTexture(hex1, hex2){
    const size = 256;
    const cnv = document.createElement('canvas');
    cnv.width = cnv.height = size;
    const ctx = cnv.getContext('2d');
    const grad = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    grad.addColorStop(0, hex1);
    grad.addColorStop(0.4, hex2);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(cnv);
  }

  // ---------------------------------------------------------------
  // Renderer / Scene / Camera
  // ---------------------------------------------------------------
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x05030a, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x05030a, 0.014);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);

  const FRAMED_POS = new THREE.Vector3(0, 9, 68);
  const FRAMED_LOOKAT = new THREE.Vector3(0, -1, 0);
  camera.position.copy(FRAMED_POS);
  camera.lookAt(FRAMED_LOOKAT);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 24;   // prevents clipping into particles / white-out
  controls.maxDistance = 105;
  controls.target.copy(FRAMED_LOOKAT);
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;
  controls.enabled = false; // enabled after present opens

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------------------------------------------------------------
  // Starfield
  // ---------------------------------------------------------------
  function makeStars(count, radius, size, colorA, colorB, opacity){
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count*3);
    const col = new Float32Array(count*3);
    const cA = new THREE.Color(colorA), cB = new THREE.Color(colorB);
    for(let i=0;i<count;i++){
      const r = radius * (0.3 + Math.random()*0.7);
      const theta = Math.random()*Math.PI*2;
      const phi = Math.acos((Math.random()*2)-1);
      pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
      pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
      pos[i*3+2] = r*Math.cos(phi);
      const c = cA.clone().lerp(cB, Math.random());
      col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color', new THREE.BufferAttribute(col,3));
    const mat = new THREE.PointsMaterial({
      size:size, map:dotTexture, vertexColors:true, transparent:true, opacity:opacity,
      depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
    });
    return new THREE.Points(geo, mat);
  }
  const farStars = makeStars(5000, 900, 1.1, 0xffffff, 0x8899ff, 0.55);
  const nearStars = makeStars(1200, 320, 1.5, 0xffe9c2, 0xffb3d9, 0.5);
  scene.add(farStars, nearStars);

  // ---------------------------------------------------------------
  // Cosmic dust (soft ambient particles, kept faint)
  // ---------------------------------------------------------------
  const dust = makeStars(350, 60, 2.2, 0xff8fc7, 0xb18aff, 0.18);
  scene.add(dust);

  // ---------------------------------------------------------------
  // Central glowing heart — sharp parametric shape, fine dense points
  // ---------------------------------------------------------------
  // Implicit heart region test (classic heart: (x^2+y^2-1)^3 - x^2*y^3 <= 0)
  // x,y normalized in roughly [-1.2,1.2] x [-1.3,1.1] with y flipped so heart points down->up correctly.
  function insideHeart(x, y){
    // flip y because the implicit formula's "point" faces downward in standard orientation;
    // we want the point of the heart at the bottom, lobes at top.
    const yy = -y;
    const a = x*x + yy*yy - 1;
    return (a*a*a - x*x*yy*yy*yy) <= 0;
  }

  const heartGroup = new THREE.Group();
  const HEART_SCALE = 5.4;

  // -- filled body: rejection-sampled points inside the heart, dense and fine --
  const fillCount = 5200;
  const fillPos = [];
  const fillCol = [];
  const cCoreWhite = new THREE.Color(0xfff1f6);
  const cPinkMid = new THREE.Color(0xe8437a);
  const cMagentaEdge = new THREE.Color(0xff6fa8);
  {
    let tries = 0;
    while(fillPos.length/3 < fillCount && tries < fillCount*40){
      tries++;
      const x = (Math.random()*2-1) * 1.25;
      const y = (Math.random()*2-1) * 1.3 + 0.05;
      if(!insideHeart(x,y)) continue;
      const depth = (Math.random()-0.5) * 0.55; // thin depth so it reads as a shape, not a blob
      const px = x*HEART_SCALE;
      const py = y*HEART_SCALE;
      const pz = depth*HEART_SCALE*0.5;
      fillPos.push(px,py,pz);

      // center brighter/whiter, edges more saturated pink/magenta
      const distFromCenter = Math.sqrt(x*x + y*y);
      const c = cCoreWhite.clone().lerp(cPinkMid, Math.min(distFromCenter/0.9, 1));
      if(distFromCenter > 0.75) c.lerp(cMagentaEdge, 0.4);
      fillCol.push(c.r, c.g, c.b);
    }
  }
  const fillGeo = new THREE.BufferGeometry();
  fillGeo.setAttribute('position', new THREE.Float32BufferAttribute(fillPos,3));
  fillGeo.setAttribute('color', new THREE.Float32BufferAttribute(fillCol,3));
  const fillMat = new THREE.PointsMaterial({
    size:0.16, map:dotTexture, vertexColors:true, transparent:true, opacity:0.75,
    depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  });
  const heartFill = new THREE.Points(fillGeo, fillMat);
  heartGroup.add(heartFill);

  // -- crisp outline: parametric curve points, slightly brighter, tight jitter --
  const outlineCount = 1400;
  const outlinePos = [];
  const outlineCol = [];
  const cOutline = new THREE.Color(0xffb8d4);
  for(let i=0;i<outlineCount;i++){
    const t = (i/outlineCount) * Math.PI*2;
    const x = 16*Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    const s = 0.34;
    const jitter = 0.06;
    const px = x*s*(HEART_SCALE/5.44) + (Math.random()-0.5)*jitter;
    const py = y*s*(HEART_SCALE/5.44) + (Math.random()-0.5)*jitter;
    const pz = (Math.random()-0.5)*0.3;
    outlinePos.push(px,py,pz);
    const c = cOutline.clone().lerp(cCoreWhite, Math.random()*0.3);
    outlineCol.push(c.r,c.g,c.b);
  }
  const outlineGeo = new THREE.BufferGeometry();
  outlineGeo.setAttribute('position', new THREE.Float32BufferAttribute(outlinePos,3));
  outlineGeo.setAttribute('color', new THREE.Float32BufferAttribute(outlineCol,3));
  const outlineMat = new THREE.PointsMaterial({
    size:0.2, map:dotTexture, vertexColors:true, transparent:true, opacity:0.85,
    depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  });
  const heartOutline = new THREE.Points(outlineGeo, outlineMat);
  heartGroup.add(heartOutline);

  heartGroup.position.set(0, 4, 0);
  scene.add(heartGroup);

  // soft glow sprite behind the heart — subtle, not screen-filling
  const heartGlowTex = makeGlowTexture('rgba(255,150,190,0.55)', 'rgba(232,67,122,0.18)');
  const heartGlow = new THREE.Sprite(new THREE.SpriteMaterial({
    map:heartGlowTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.8
  }));
  heartGlow.scale.set(13,13,1);
  heartGlow.position.copy(heartGroup.position);
  scene.add(heartGlow);

  // ---------------------------------------------------------------
  // Galaxy disk (swirling particles) + luminous core
  // ---------------------------------------------------------------
  const galaxyGroup = new THREE.Group();
  scene.add(galaxyGroup);

  const armCount = 5;
  const galaxyParticles = 11000;
  const gGeo = new THREE.BufferGeometry();
  const gPos = new Float32Array(galaxyParticles*3);
  const gCol = new Float32Array(galaxyParticles*3);

  const colorGold = new THREE.Color(0xf2c879);
  const colorMagenta = new THREE.Color(0xe8558f);
  const colorPurple = new THREE.Color(0x7a5bcf);

  for(let i=0;i<galaxyParticles;i++){
    const radius = Math.pow(Math.random(), 0.65) * 55 + 4;
    const armOffset = (i % armCount) * (Math.PI*2/armCount);
    const spin = radius * 0.18;
    const randomAngleJitter = (Math.random()-0.5) * 0.5;
    const angle = armOffset + spin + randomAngleJitter;

    const spread = (1 - radius/60) * 2.6 + 0.25;
    const px = Math.cos(angle)*radius + (Math.random()-0.5)*spread*2;
    const pz = Math.sin(angle)*radius + (Math.random()-0.5)*spread*2;
    const py = (Math.random()-0.5)*spread*0.45 * (radius<10?2.2:1);

    gPos[i*3]=px; gPos[i*3+1]=py; gPos[i*3+2]=pz;

    let c;
    const mix = radius/60;
    if(radius < 8){ c = colorGold.clone().lerp(new THREE.Color(0xfff2df), 0.35); }
    else if(mix < 0.5){ c = colorGold.clone().lerp(colorMagenta, mix*2); }
    else { c = colorMagenta.clone().lerp(colorPurple, (mix-0.5)*2); }
    gCol[i*3]=c.r; gCol[i*3+1]=c.g; gCol[i*3+2]=c.b;
  }
  gGeo.setAttribute('position', new THREE.BufferAttribute(gPos,3));
  gGeo.setAttribute('color', new THREE.BufferAttribute(gCol,3));
  const gMat = new THREE.PointsMaterial({
    size:0.34, map:dotTexture, vertexColors:true, transparent:true, opacity:0.6,
    depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  });
  const galaxyPoints = new THREE.Points(gGeo, gMat);
  galaxyGroup.add(galaxyPoints);
  galaxyGroup.rotation.x = 0.35;
  galaxyGroup.position.y = -6;

  // luminous core / black-hole glow — toned down
  const coreGlowTex = makeGlowTexture('rgba(255,240,205,0.85)', 'rgba(255,160,90,0.25)');
  const coreGlow = new THREE.Sprite(new THREE.SpriteMaterial({
    map:coreGlowTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.85
  }));
  coreGlow.scale.set(11,11,1);
  coreGlow.position.set(0,0,0);
  galaxyGroup.add(coreGlow);

  const coreMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.1, 32, 32),
    new THREE.MeshBasicMaterial({ color:0xfff2d0 })
  );
  galaxyGroup.add(coreMesh);

  // ---------------------------------------------------------------
  // Orbiting romantic text (small, elegant, metallic rose-gold sprites)
  // ---------------------------------------------------------------
  function makeTextSprite(text){
    const dpr = 2; // render crisp then downscale via world-scale
    const fontSize = 34 * dpr;
    const padding = 16 * dpr;
    const cnv = document.createElement('canvas');
    const ctx = cnv.getContext('2d');
    ctx.font = `400 ${fontSize}px Georgia, 'Times New Roman', serif`;

    // add manual letter spacing by measuring pieces
    const letterSpacing = 3 * dpr;
    let totalWidth = 0;
    for(const ch of text){ totalWidth += ctx.measureText(ch).width + letterSpacing; }
    cnv.width = Math.ceil(totalWidth) + padding*2;
    cnv.height = fontSize + padding*2;

    ctx.font = `400 ${fontSize}px Georgia, 'Times New Roman', serif`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';

    const grad = ctx.createLinearGradient(0,0,cnv.width,0);
    grad.addColorStop(0, '#f2c879');
    grad.addColorStop(0.5, '#e8b6a0');
    grad.addColorStop(1, '#e8907a');

    ctx.shadowColor = 'rgba(240,190,150,0.55)';
    ctx.shadowBlur = 8 * dpr;
    ctx.fillStyle = grad;

    let x = padding;
    const y = cnv.height/2;
    for(const ch of text){
      ctx.fillText(ch, x, y);
      x += ctx.measureText(ch).width + letterSpacing;
    }

    const tex = new THREE.CanvasTexture(cnv);
    tex.minFilter = THREE.LinearFilter;
    tex.anisotropy = 4;
    const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.9 });
    const sprite = new THREE.Sprite(mat);
    const aspect = cnv.width/cnv.height;
    const h = 1.6; // small, elegant scale in world units
    sprite.scale.set(h*aspect, h, 1);
    return sprite;
  }

  const messages = [
    "HAPPY BIRTHDAY",
    "I LOVE YOU",
    "MY EVERYTHING",
    "FOREVER & ALWAYS",
    "YOU ARE MY UNIVERSE"
  ];

  const orbitItems = []; // {obj, radius, speed, angle, yOff}

  messages.forEach((m, i) => {
    const sprite = makeTextSprite(m);
    const radius = 22 + i*5;
    const angle = (i/messages.length)*Math.PI*2;
    const yOff = Math.sin(i*1.7)*5 + 5;
    sprite.position.set(Math.cos(angle)*radius, yOff, Math.sin(angle)*radius);
    scene.add(sprite);
    orbitItems.push({ obj:sprite, radius, speed:0.045 + i*0.006, angle, yOff, bobPhase:Math.random()*Math.PI*2 });
  });

  // Small floating heart icons orbiting — no boxy frames, just soft hearts
  function makeHeartIconSprite(size, color){
    const cnv = document.createElement('canvas');
    cnv.width = cnv.height = 128;
const ctx = cnv.getContext('2d');
    ctx.translate(64,64);
    ctx.beginPath();
    ctx.moveTo(0, 18);
    ctx.bezierCurveTo(-22, -12, -38, 10, 0, 34);
    ctx.bezierCurveTo(38, 10, 22, -12, 0, 18);
    ctx.closePath();
    ctx.shadowColor = color;
    ctx.shadowBlur = 14;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.fill();
    const tex = new THREE.CanvasTexture(cnv);
    const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.8 });
    const sp = new THREE.Sprite(mat);
    sp.scale.set(size,size,1);
    return sp;
  }

  const decorCount = 8;
  for(let i=0;i<decorCount;i++){
    const sprite = makeHeartIconSprite(1.1 + Math.random()*0.7, i%2===0? '#e8558f':'#f2c879');
    const radius = 16 + Math.random()*42;
    const angle = Math.random()*Math.PI*2;
    const yOff = (Math.random()-0.5)*18;
    sprite.position.set(Math.cos(angle)*radius, yOff, Math.sin(angle)*radius);
    scene.add(sprite);
    orbitItems.push({ obj:sprite, radius, speed:0.04 + Math.random()*0.07, angle, yOff, bobPhase:Math.random()*Math.PI*2 });
  }

  // ---------------------------------------------------------------
  // Ambient lighting — kept low so nothing overexposes
  // ---------------------------------------------------------------
  scene.add(new THREE.AmbientLight(0x554466, 0.6));
  const pointLight = new THREE.PointLight(0xffcf9e, 0.8, 100);
  pointLight.position.set(0,5,0);
  galaxyGroup.add(pointLight);

  // ---------------------------------------------------------------
  // Animation loop
  // ---------------------------------------------------------------
  const clock = new THREE.Clock();

  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const t = clock.getElapsedTime();

    // galaxy rotation
    galaxyGroup.rotation.y += dt * 0.06;

    // heart pulse — gentle scale only, no color/opacity blow-out
    const pulse = 1 + Math.sin(t*2.0)*0.045;
    heartGroup.scale.set(pulse, pulse, pulse);
    heartGroup.position.y = 4 + Math.sin(t*1.2)*0.4;
    heartGroup.rotation.y = Math.sin(t*0.3)*0.15;
    heartGlow.position.copy(heartGroup.position);
    const glowPulse = 1 + Math.sin(t*2.0)*0.08;
    heartGlow.scale.set(13*glowPulse, 13*glowPulse, 1);

    // core glow subtle pulse
    const corePulse = 1 + Math.sin(t*1.6)*0.06;
    coreGlow.scale.set(11*corePulse, 11*corePulse, 1);

    // orbiting text & decor
    orbitItems.forEach(item => {
      item.angle += dt * item.speed;
      const bob = Math.sin(t*0.8 + item.bobPhase) * 1.2;
      item.obj.position.x = Math.cos(item.angle) * item.radius;
      item.obj.position.z = Math.sin(item.angle) * item.radius;
      item.obj.position.y = item.yOff + bob;
    });

    // gentle star drift
    farStars.rotation.y += dt * 0.002;
    nearStars.rotation.y -= dt * 0.004;
    dust.rotation.y += dt * 0.006;

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ---------------------------------------------------------------
  // Landing overlay interaction
  // ---------------------------------------------------------------
  const overlay = document.getElementById('overlay');
  const openBtn = document.getElementById('open-btn');
  const hint = document.getElementById('hint');
  const backBtn = document.getElementById('back-btn');

  // start slightly further out than the framed position for a subtle fly-in
  const START_POS = new THREE.Vector3(0, 14, 92);
  camera.position.copy(START_POS);
  camera.lookAt(FRAMED_LOOKAT);

  function openPresent(){
    overlay.classList.add('fade-out');
    controls.enabled = true;

    const startPos = camera.position.clone();
    const endPos = FRAMED_POS.clone();
    const duration = 2200;
    const startTime = performance.now();

    function flyIn(now){
      const p = Math.min((now - startTime)/duration, 1);
      const ease = 1 - Math.pow(1-p, 3);
      camera.position.lerpVectors(startPos, endPos, ease);
      camera.lookAt(FRAMED_LOOKAT);
      if(p < 1) requestAnimationFrame(flyIn);
    }
    requestAnimationFrame(flyIn);

    setTimeout(() => {
      hint.classList.add('show');
      backBtn.classList.add('show');
    }, 900);
  }

  openBtn.addEventListener('click', openPresent);

  backBtn.addEventListener('click', () => {
    overlay.classList.remove('fade-out');
    controls.enabled = false;
    controls.autoRotate = true;
    hint.classList.remove('show');
    backBtn.classList.remove('show');
    camera.position.copy(START_POS);
    camera.lookAt(FRAMED_LOOKAT);
  });

})();
</script>
</body>
</html>
